name: CI Quality Pipeline

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Run unit tests with coverage
        run: npm run test:ci
        env:
          NODE_OPTIONS: --experimental-vm-modules
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 1

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vulnerablenode
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NODE_OPTIONS: --experimental-vm-modules
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/vulnerablenode
          SESSION_SECRET: ci-test-secret-key

  sbom-and-scan:
    name: SBOM Generation & Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci

      # ── SBOM generation ──────────────────────────────────────────────────────
      - name: Generate SBOM with Syft (CycloneDX JSON)
        uses: anchore/syft-action@v2
        with:
          path: "."
          format: "cyclonedx-json"
          output-file: "sbom-ci.json"
          artifact-name: "sbom"

      # ── Vulnerability scan: Grype (Anchore) ──────────────────────────────────
      - name: Scan dependencies with Grype
        uses: anchore/scan-action@v6
        id: grype-scan
        with:
          path: "."
          fail-build: true
          severity-cutoff: high
          output-format: table

      # ── Vulnerability scan: Trivy (Aqua Security) ───────────────────────────
      - name: Scan filesystem with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      # ── npm audit gate ────────────────────────────────────────────────────────
      - name: npm audit (HIGH/CRITICAL gate)
        run: npm run audit:check

      # ── Upload evidence artifacts ─────────────────────────────────────────────
      - name: Upload vulnerability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/vulnerability/
          retention-days: 30

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
